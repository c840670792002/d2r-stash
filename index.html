<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2R 數位圖書館 | 裝備保留指南</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <span class="icon">⚔️</span>
                <h1>D2R Library</h1>
            </div>
            <ul class="nav-links">
                <li class="active" data-section="uniques">暗金裝備</li>
                <li data-section="bases">有價底材</li>
                <li data-section="sets">套裝指南</li>
                <li data-section="rings">戒指鑑定</li>
                <li data-section="charms">咒符與奇物</li>
                <li data-section="diagnosis">✨ 智慧診斷 (BETA)</li>
            </ul>
            <div class="sidebar-footer">
                <p>Version 2.7+ Updated</p>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content-area">
            <section id="diagnosis-section" class="hidden">
                <div class="diagnosis-container">
                    <div class="diagnosis-header">
                        <h2>智慧截圖診斷 (BETA)</h2>
                        <p>在遊戲中截圖 (Win+Shift+S)，回到此處直接 <strong>Ctrl + V</strong> 貼上即可開始診斷。</p>
                    </div>
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-zone-content">
                            <i class="icon-paste"></i>
                            <span>點擊此處後貼上截圖 (Ctrl+V)</span>
                        </div>
                        <img id="preview-img" class="hidden" alt="Screenshot Preview">
                    </div>
                    <div id="diagnosis-result" class="diagnosis-result hidden">
                        <div class="result-header">
                            <span>🔍 鑑定分析報告</span>
                            <button id="clear-diagnosis" class="btn-clear">清除</button>
                        </div>
                        <div class="result-body" id="result-body">
                            <!-- Analysis content will be injected here -->
                        </div>
                    </div>
                </div>
            </section>

            <header class="content-header">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="搜尋裝備名稱或屬性...">
                </div>
                <div class="user-info">
                    <span class="status-badge">Online</span>
                </div>
            </header>

            <section id="main-view">
                <div class="section-header">
                    <h2 id="section-title">暗金裝備保留指南</h2>
                    <p id="section-desc">整理遊戲中值得保留的暗金裝備，標註關鍵屬性與建議數值。</p>
                </div>

                <div id="card-grid" class="grid-container">
                    <!-- Cards will be injected here by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Scripts with Cache-Busting -->
    <script>
        const scripts = ['data.js', 'unique_names.js', 'app.js'];
        const version = Date.now();
        scripts.forEach(src => {
            const script = document.createElement('script');
            script.src = `${src}?v=${version}`;
            document.body.appendChild(script);
        });
    </script>
</body>

</html>
